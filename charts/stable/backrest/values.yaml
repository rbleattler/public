# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/garethgeorge/backrest
  tag: v1.14.1@sha256:b852979754281026230cc69fb11428e6d57c9a97784ab4a444ffc7934c53a215
  pullPolicy: IfNotPresent

service:
  main:
    ports:
      main:
        port: 9898

workload:
  main:
    podSpec:
      containers:
        main:
          env:
            BACKREST_PORT: "0.0.0.0:{{ .Values.service.main.ports.main.port }}"
            BACKREST_DATA: /data
            BACKREST_CONFIG: /config/config.json
            XDG_CACHE_HOME: /cache
            TMPDIR: /tmp

persistence:
  data:
    enabled: true
    mountPath: /data
  config:
    enabled: true
    mountPath: /config
  cache:
    enabled: true
    mountPath: /cache
  tmp:
    enabled: true
    type: emptyDir
    mountPath: /tmp
  userdata:
    enabled: false
    mountPath: /userdata
    readOnly: true
