# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/leonismoe/ariang
  pullPolicy: IfNotPresent
  tag: 1.3.13@sha256:eb9abf28d706026ce82075fc126b900badf401d95db5c0ed1971db92df56be03
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    allowPrivilegeEscalation: true
    runAsUser: 0
    runAsGroup: 0
    capabilities:
      add:
        - SYS_CHROOT
service:
  main:
    ports:
      main:
        targetPort: 8080
        protocol: http
        port: 10276
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: http
              path: /
            readiness:
              type: http
              path: /
            startup:
              type: http
              path: /
          env: {}
