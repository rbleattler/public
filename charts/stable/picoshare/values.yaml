# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/mtlynch/picoshare
  tag: 1.5.2@sha256:1b786f8bb8cc1deb5faa595dee65facd3c42503446b6da3c15acf41ed5044709
  pullPolicy: IfNotPresent
service:
  main:
    ports:
      main:
        port: 10209
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            PORT: "{{ .Values.service.main.ports.main.port }}"
            # web admin password
            PS_SHARED_SECRET: "somesecretcode"
            # optional
            LITESTREAM_BUCKET: ""
            LITESTREAM_ENDPOINT: ""
            LITESTREAM_ACCESS_KEY_ID: ""
            LITESTREAM_SECRET_ACCESS_KEY: ""
            LITESTREAM_RETENTION: 72h
persistence:
  data:
    enabled: true
    mountPath: "/data"
