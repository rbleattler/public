# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/mpepping/cyberchef
  tag: v10.23.0@sha256:37955fd1e28397c6dce0858210d839b92a6291e870d6f20d27e1f3efff93de27
  pullPolicy: IfNotPresent
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
service:
  main:
    ports:
      main:
        port: 10219
        protocol: http
        targetPort: 8000
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: http
              path: /
            readiness:
              type: http
              path: /
            startup:
              type: http
              path: /
          env: {}
