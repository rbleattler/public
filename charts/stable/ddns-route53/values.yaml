# yaml-language-server: $schema=./values.schema.json
image:
  pullPolicy: IfNotPresent
  repository: docker.io/crazymax/ddns-route53
  tag: latest@sha256:34edab2d59208f72e4f5ec6618e4347e1bfd751a66d3de8542cd64c2e2d3bac2
persistence: {}

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsGroup: 0
    runAsUser: 0
service:
  main:
    enabled: false
    ports:
      main:
        enabled: false
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            DDNSR53_CREDENTIALS_ACCESSKEYID: ABCDEFGHIJKLMNO123456
            DDNSR53_CREDENTIALS_SECRETACCESSKEY: abcdefgh123456IJKLMN+OPQRS7890+ABCDEFGH
            DDNSR53_ROUTE53_HOSTEDZONEID: ABCEEFG123456789
            DDNSR53_ROUTE53_RECORDSSET_0_NAME: ddns.example.com.
            DDNSR53_ROUTE53_RECORDSSET_0_TTL: "300"
            DDNSR53_ROUTE53_RECORDSSET_0_TYPE: A
            LOG_JSON: "false"
            LOG_LEVEL: info
            MAX_RETRIES: "3"
            SCHEDULE: "*/30 * * * *"
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
