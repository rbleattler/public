# yaml-language-server: $schema=./values.schema.json
image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/ich777/terrariaserver
  tag: tshock@sha256:fc949561109bbb80c291e288cdbde8e17e432423a77bcf71aa2a5b12954805f4
persistence:
  serverfiles:
    enabled: true
    mountPath: /serverdata/serverfiles

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsGroup: 0
    runAsUser: 0
service:
  main:
    ports:
      main:
        port: 9014
        protocol: http
        targetPort: 8080
  tcp:
    enabled: true
    ports:
      tcp:
        enabled: true
        port: 7777
terraria:
  autocreate: "1"
  easy_game_params:
    noupnp: true
    secure: false
    steam: false
  game_params: []
  lang: en-US
  maxplayers: 16
  pass: secretpass
  seed: AwesomeSeed
  worldname: scale terraria
workload:
  main:
    podSpec:
      containers:
        main:
          envFrom:
            - secretRef:
                name: terraria-secret
