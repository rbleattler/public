# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/whyour/qinglong
  pullPolicy: IfNotPresent
  tag: 2.21.0@sha256:a50f545d086bbb20390bc274d967b728e20aa99129774221f460cc6e8c098684
service:
  main:
    ports:
      main:
        targetPort: 5700
        port: 10176
persistence:
  data:
    enabled: true
    mountPath: "/ql/data"

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
