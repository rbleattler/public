# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/whyour/qinglong
  pullPolicy: IfNotPresent
  tag: 2.21.0@sha256:a5075dfce142698d814233973c3236e8577bbe681c23d39bd72b1c9c9b7fc8ee
service:
  main:
    ports:
      main:
        targetPort: 5700
        port: 10176
persistence:
  data:
    enabled: true
    mountPath: "/ql/data"

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
