  tag: v1.36.3@sha256:1eb63d895d5d4be73be1b6d5914fe7a36efc8b389e093abe96eb6fbc4db49b26
  pullPolicy: IfNotPresent
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
workload:
