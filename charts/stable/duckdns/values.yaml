# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/linuxserver/duckdns
  pullPolicy: IfNotPresent
  tag: latest@sha256:71737cabc025d139822146c66529705608155b7e1d13c8b3c6d7948e68400306
securityContext:
  container:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
service:
  main:
    enabled: false
    ports:
      main:
        enabled: false
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
            SUBDOMAINS: ""
            LOG_FILE: false
            TOKEN: ""
persistence:
  config:
    enabled: true
    mountPath: /config
