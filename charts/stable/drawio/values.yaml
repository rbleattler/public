# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/jgraph/drawio
  tag: 30.0.4@sha256:209f3d183f89d2cd7c8fc30eb813d78766654c1cc26d07dc567c1beff88580de
  pullPolicy: IfNotPresent
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
service:
  main:
    ports:
      main:
        port: 10214
        targetPort: 8080
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: http
              path: /
            readiness:
              type: http
              path: /
            startup:
              type: http
              path: /
          env: {}
