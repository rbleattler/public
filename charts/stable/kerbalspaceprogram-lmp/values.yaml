# yaml-language-server: $schema=./values.schema.json
image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/ich777/lunamultiplayer-ksp
  tag: latest@sha256:6a5f477bec10f6a82aacd08a29fdf1087e2f77af7f367c915d27202d6837475e
persistence:
  serverfiles:
    enabled: true
    mountPath: /lunamultiplayer

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsGroup: 0
    runAsUser: 0
service:
  main:
    ports:
      main:
        port: 8800
        protocol: udp
        targetPort: 8800
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            DATA_PERM: "770"
            LMP_V: latest@sha256:f0065aa44fb1c38b7fc30d34e220138dc0a0c6477b78eb7f59015622c2052030
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
