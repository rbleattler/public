# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/sentriz/gonic
  pullPolicy: IfNotPresent
  tag: v0.21.0@sha256:a6b7abf599cdfdf079a18df16ec2b8067cf85d60d056b439e3096b6a157e4dd9

securityContext:
  container:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0

service:
  main:
    ports:
      main:
        port: 10023

workload:
  main:
    podSpec:
      containers:
        main:
          env:
            GONIC_LISTEN_ADDR: ":{{ .Values.service.main.ports.main.port }}"
            GONIC_DB_PATH: "{{ .Values.persistence.data.mountPath }}/gonic.db"
            GONIC_CACHE_PATH: "{{ .Values.persistence.cache.mountPath }}"
            GONIC_PLAYLISTS_PATH: "{{ .Values.persistence.playlists.mountPath }}"
            GONIC_PODCAST_PATH: "{{ .Values.persistence.podcast.mountPath }}"
            GONIC_MUSIC_PATH: "{{ .Values.persistence.music.mountPath }}"

persistence:
  data:
    enabled: true
    mountPath: /data
  cache:
    enabled: true
    mountPath: /cache
  playlists:
    enabled: true
    mountPath: /playlists
  podcast:
    enabled: true
    mountPath: /podcast
  music:
    enabled: true
    mountPath: /music
