# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/qmcgaw/ddns-updater
  tag: v2.10.0@sha256:3e2aa558946b5a293def4d73008fa4651c072b2c12932cecd02126fb23979831
  pullPolicy: IfNotPresent
service:
  main:
    ports:
      main:
        port: 10227
        protocol: http
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: http
              path: /
            readiness:
              type: http
              path: /
            startup:
              type: http
              path: /
          env:
            LISTENING_ADDRESS: ":{{ .Values.service.main.ports.main.port }}"
            CONFIG: ""
            PERIOD: "5m"
            IPV6_PREFIX: "/128"
            PUBLICIP_FETCHERS: "all"
            PUBLICIP_HTTP_PROVIDERS: "all"
            PUBLICIPV4_HTTP_PROVIDERS: "all"
            PUBLICIPV6_HTTP_PROVIDERS: "all"
            PUBLICIP_DNS_PROVIDERS: "all"
            PUBLICIP_DNS_TIMEOUT: "3s"
            UPDATE_COOLDOWN_PERIOD: "5m"
            HTTP_TIMEOUT: "10s"
            BACKUP_PERIOD: "0"
            LOG_LEVEL: "info"
            LOG_CALLER: "hidden"
            SHOUTRRR_ADDRESSES: ""
persistence:
  data:
    enabled: true
    mountPath: /updater/data
