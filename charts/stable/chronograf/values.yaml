  repository: chronograf
  tag: latest@sha256:d203c11a72e04d07f3d956911e4e7a32d8f631c28710423111aa929638c33d6d
persistence:
  chronograf:
    enabled: true
    mountPath: /var/lib/chronograf

securityContext:
