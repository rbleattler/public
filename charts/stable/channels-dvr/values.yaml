# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/fancybits/channels-dvr
  pullPolicy: Always
  tag: latest@sha256:438e362cf739f4d002ecdcc17baee6917ecd22a8d9d4aa044288042c1039d591
tveImage:
  repository: docker.io/fancybits/channels-dvr
  pullPolicy: Always
  tag: tve@sha256:46f26e048b20c0cdf18a042efa4da81be94ededa09b796c40be9e4382bee78d2
service:
  main:
    ports:
      main:
        port: 8089
        protocol: http
        targetPort: 8089
persistence:
  config:
    enabled: true
    mountPath: /channels-dvr
  recordings:
    enabled: true
    mountPath: /shares/DVR

workload:
  main:
    podSpec:
      containers:
        main:
          imageSelector: image
          probes:
            liveness:
              port: 8089
              type: http
            readiness:
              port: 8089
              type: http
            startup:
              port: 8089
              type: http
updated: true
