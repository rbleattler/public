# yaml-language-server: $schema=./values.schema.json
image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/enchant97/hasty-paste
  tag: 2.4.0@sha256:5808f5886f1a0efe446abf4bea1decf62c50508c6ca32174eabdb97823a7307b
persistence:
  config:
    enabled: true
    mountPath: /opt/hasty-paste/data
service:
  main:
    ports:
      main:
        port: 10601
        protocol: http
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            PUBLIC_URL: "http://example.com"
            # Secrets can be generated by this command: openssl rand -base64 32
            AUTH_TOKEN_SECRET: ""
            SESSION_SECRET: ""
            BIND__PORT: "{{ .Values.service.main.ports.main.port }}"
