# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/601096721/mosdns
  pullPolicy: IfNotPresent
  tag: v5.3.4@sha256:e6dbd71267144006c210585412973aee91deef97e6d4fcd4c416a0f5617fef07
service:
  main:
    ports:
      main:
        targetPort: 53
        port: 53
      dns-upd:
        enabled: true
        protocol: udp
        targetPort: 53
        port: 53
persistence:
  data:
    enabled: true
    mountPath: "/etc/mosdns"

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: tcp
            readiness:
              type: tcp
            startup:
              type: tcp
