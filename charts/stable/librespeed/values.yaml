  tag: 6.2.0@sha256:8e5138af10af2eb1998518a7b02cbdafe9a03ab815bd7eb4b4407c7f4a636c69
  pullPolicy: IfNotPresent
service:
  main:
    ports:
      main:
        port: 10016
        targetPort: 80
persistence:
