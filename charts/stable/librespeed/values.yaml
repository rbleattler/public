  tag: 6.1.0@sha256:ceeb3439fc2ac5dcebe9f78ec34eaf5f8f0d86cb86713462d32b0f09bcc3803a
  pullPolicy: IfNotPresent
service:
  main:
    ports:
      main:
        port: 10016
        targetPort: 80
persistence:
  config:
    enabled: true
    mountPath: "/config"

securityContext:
