# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/nwithan8/tauticord
  pullPolicy: IfNotPresent
  tag: 5.16.0@sha256:6ff0d95c609c25d3e0a46f45cf0fbb5d96c8c71b13650db3949dab3f764b56f1

securityContext:
  container:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0

# used for webhook; likely be disabled if not needed
service:
  main:
    ports:
      main:
        port: 8283
        protocol: http
        targetPort: 8283

workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: "{{ .Values.service.main.enabled }}"
              path: "/ping"
            readiness:
              enabled: "{{ .Values.service.main.enabled }}"
              path: "/ping"
            startup:
              enabled: "{{ .Values.service.main.enabled }}"
              path: "/ping"
          env: {}

persistence:
  config:
    enabled: true
    mountPath: "/config"
  logs:
    enabled: true
    mountPath: "/logs"
  # media libraries
  monitor:
    enabled: true
    mountPath: "/monitor"
