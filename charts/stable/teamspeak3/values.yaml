# yaml-language-server: $schema=./values.schema.json
image:
  pullPolicy: IfNotPresent
  repository: teamspeak
  tag: 3.13.8@sha256:11fb1dd03c68ae7b3a8a86c5a08827d01d87a833177ad92ee5c19d7b72d08ce0
persistence:
  data:
    enabled: true
    mountPath: /var/ts3server
  config:
    enabled: true
    mountPath: /var/run/ts3server

securityContext:
  container:
    readOnlyRootFilesystem: false
service:
  main:
    ports:
      main:
        primary: true
        enabled: true
        port: 10011
        targetPort: 10011
      query:
        enabled: true
        port: 10022
        targetPort: 10022
      voice:
        enabled: true
        port: 9987
        protocol: udp
        targetPort: 9987
      files:
        enabled: true
        port: 30033
        targetPort: 30033
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: tcp
            readiness:
              type: tcp
            startup:
              type: tcp
          env:
            TS3SERVER_LICENSE: accept
