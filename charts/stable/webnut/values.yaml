# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/edgd1er/webnut
  pullPolicy: IfNotPresent
  tag: latest@sha256:b366370bbea5127642dc6e7a71103c9402e4319ede84ca1cdf042ed4d62f6cd2
service:
  main:
    ports:
      main:
        port: 10585
        protocol: http
        targetPort: 6543

securityContext:
  container:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            UPS_HOST: "127.0.0.1"
            UPS_PORT: 3493
            UPS_USER: monuser
            UPS_PASSWORD: secret
persistence:
  config:
    enabled: true
    mountPath: "/config"
