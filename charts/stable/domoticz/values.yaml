# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/domoticz/domoticz
  pullPolicy: IfNotPresent
  tag: 2026.18004@sha256:03f29721d212189ca29bffa8b72b719fcb6155c1e6aff90eaba4160480fe9186
securityContext:
  container:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
service:
  main:
    ports:
      main:
        port: 10144
  comm1:
    enabled: true
    ports:
      comm1:
        enabled: true
        targetPort: 6144
        port: 6144
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            # Set default http port. Container also has SSL_PORT variable for SSL.
            WWW_PORT: "{{ .Values.service.main.ports.main.port }}"
            # Set userdata path to match previous linuxserver.io default
            EXTRA_CMD_ARG: "-userdata {{ .Values.persistence.config.mountPath }}"
persistence:
  config:
    enabled: true
    mountPath: /opt/domoticz/userdata
