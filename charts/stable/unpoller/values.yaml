# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/unpoller/unpoller
  pullPolicy: IfNotPresent
  tag: v3.3.0@sha256:1c03bc25d83c5dde54e7436a010851d2db4831f8afe4f2ee60699d52dd01c5c4
service:
  main:
    ports:
      main:
        port: 9130
metrics:
  main:
    enabled: true
    type: "servicemonitor"
    endpoints:
      - port: main
        path: /metrics
    prometheusRule:
      enabled: false

workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              path: /
            readiness:
              path: /
            startup:
              path: /
          env:
            # UP_UNIFI_DEFAULT_URL: "https://127.0.0.1:8443"
            # UP_UNIFI_DEFAULT_USER: "unifipoller"
            # UP_UNIFI_DEFAULT_PASS: "unifipoller"
            UP_PROMETHEUS_DISABLE: false

configmap:
  dashboards:
    enabled: true
    labels:
      grafana_dashboard: "1"
    data:
      upUAP.json: >-
        {{ .Files.Get "dashboards/UAP.json" | indent 8 }}
      upclients.json: >-
        {{ .Files.Get "dashboards/clients.json" | indent 8 }}
      upUSW.json: >-
        {{ .Files.Get "dashboards/USW.json" | indent 8 }}
      upnetwork.json: >-
        {{ .Files.Get "dashboards/network.json" | indent 8 }}
      upUSG.json: >-
        {{ .Files.Get "dashboards/USG.json" | indent 8 }}
      upDPI.json: >-
        {{ .Files.Get "dashboards/DPI.json" | indent 8 }}
