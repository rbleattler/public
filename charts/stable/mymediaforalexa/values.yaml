# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/bizmodeller/mymediaforalexa
  pullPolicy: IfNotPresent
  tag: 1.3.156.0@sha256:0638ca161d15de60cab8b0f75b440e435c6ccc134f384990e006a7198aa33ca8
service:
  main:
    ports:
      main:
        targetPort: 52051
        port: 52051
  sub:
    enabled: true
    ports:
      sub:
        enabled: true
        targetPort: 52050
        port: 52050
persistence:
  data:
    enabled: true
    mountPath: "/datadir"
  media:
    enabled: true
    mountPath: "/medialibrary"

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
