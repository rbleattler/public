# yaml-language-server: $schema=./values.schema.json
image:
  pullPolicy: IfNotPresent
  repository: registry.gitlab.com/crafty-controller/crafty-4
  tag: 4.10.1@sha256:dff45185258fe8664a8e2da72f6ce33a3ec103aa3e4b9c463a6c577740d4e49c
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsGroup: 1000
    runAsUser: 1000
service:
  main:
    ports:
      main:
        port: 10586
        protocol: https
        targetPort: 8443
  redirects:
    enabled: true
    ports:
      redirects:
        enabled: true
        port: 10587
        protocol: https
        targetPort: 8000
  minecraft:
    enabled: true
    ports:
      minecraft:
        enabled: true
        port: 25565
        targetPort: 25565
  bedrock:
    enabled: true
    ports:
      bedrock:
        enabled: true
        port: 19132
        protocol: udp
        targetPort: 19132
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: https
              path: /
            readiness:
              type: https
              path: /
            startup:
              type: https
              path: /
          env: {}
persistence:
  config:
    enabled: true
    mountPath: /crafty/app/config
  servers:
    enabled: true
    mountPath: /crafty/servers
  logs:
    enabled: true
    mountPath: /crafty/logs
  import:
    enabled: true
    mountPath: /crafty/import
  backups:
    enabled: true
    mountPath: /crafty/backups
