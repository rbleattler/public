# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/linuxserver/rsnapshot
  pullPolicy: IfNotPresent
  tag: 1.4.5@sha256:f6c3283a96d71e1b141fb54ebbfa6583b5eaa790e1459a2d26d6de10e9e1ff6d
service:
  main:
    enabled: false
    ports:
      main:
        enabled: false
persistence:
  varrun:
    enabled: true
  config:
    enabled: true
    mountPath: "/config"

securityContext:
  container:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
