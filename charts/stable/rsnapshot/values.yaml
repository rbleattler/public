# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/linuxserver/rsnapshot
  pullPolicy: IfNotPresent
  tag: 1.4.5@sha256:126fd897a91492d497e557837c4f8d1d47f0120b7d4c22e532f951d9433ce6ca
service:
  main:
    enabled: false
    ports:
      main:
        enabled: false
persistence:
  varrun:
    enabled: true
  config:
    enabled: true
    mountPath: "/config"

securityContext:
  container:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
