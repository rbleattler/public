# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/linuxserver/rsnapshot
  pullPolicy: IfNotPresent
  tag: 1.4.5@sha256:8b238ae03f43743f1aa49472964a302ff1e1de80f58a204f4b566fdade6c2ffb
service:
  main:
    enabled: false
    ports:
      main:
        enabled: false
persistence:
  varrun:
    enabled: true
  config:
    enabled: true
    mountPath: "/config"

securityContext:
  container:
    runAsNonRoot: false
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
