# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/b4bz/homer
  tag: v26.4.2@sha256:ace7c6a2cfb66e13f0e94d5534cb569562f190aa5cac9446b2453ef7822cd195
  pullPolicy: IfNotPresent
service:
  main:
    ports:
      main:
        port: 10178
        targetPort: 8080
persistence:
  config:
    enabled: true
    mountPath: "/www/assets"

securityContext:
  container:
    runAsUser: 1000
    runAsGroup: 1000
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            INIT_ASSETS: true
