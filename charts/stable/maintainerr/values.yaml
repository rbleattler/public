# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/jorenn92/maintainerr
  pullPolicy: IfNotPresent
  tag: 3.3.0@sha256:38c54e15c730e160fdd11707bf36d2129f303df08c0bd4ef8ae49dd12e94b232

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0

service:
  main:
    ports:
      main:
        protocol: http
        targetPort: 6246
        port: 6246

persistence:
  data:
    enabled: true
    mountPath: "/opt/data"
