# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/jorenn92/maintainerr
  pullPolicy: IfNotPresent
  tag: 3.6.0@sha256:d6a704ec9b260ff13e87e28cd82fb879686e9478c25e231b9ec640d12fe0f46a

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0

service:
  main:
    ports:
      main:
        protocol: http
        targetPort: 6246
        port: 6246

persistence:
  data:
    enabled: true
    mountPath: "/opt/data"
