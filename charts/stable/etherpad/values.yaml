# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/ether/etherpad
  pullPolicy: IfNotPresent
  tag: 2.6.1@sha256:69a697fe6bf75aecf8748d734bcca5f0e596a6eeec8342ab030d0da8a6f224d5
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
service:
  main:
    ports:
      main:
        port: 10060
        targetPort: 9001
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            DB_TYPE: "postgres"
            DB_NAME: "{{ .Values.cnpg.main.database }}"
            DB_USER: "{{ .Values.cnpg.main.user }}"
            DB_PORT: "5432"
            DB_PASS:
              secretKeyRef:
                name: cnpg-main-user
                key: password
            DB_HOST:
              secretKeyRef:
                name: cnpg-main-urls
                key: host
            # User Defined

            TITLE: "Etherpad"
            FAVICON: "favicon.ico"
            DEFAULT_PAD_TEXT: "Welcome to Etherpad! This pad text is synchronized as you type, so that everyone viewing this page sees the same text. This allows you to collaborate seamlessly on documents! Get involved with Etherpad at https://etherpad.org"
            ADMIN_PASSWORD: "adminpass"
            USER_PASSWORD: "firstuserpass"
persistence:
  data:
    enabled: true
    mountPath: "/opt/etherpad-lite/var"
cnpg:
  main:
    enabled: true
    user: etherpad
    database: etherpad
