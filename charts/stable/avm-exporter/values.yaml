# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/pdreker/fritz_exporter
  pullPolicy: IfNotPresent
  tag: 3.2.1@sha256:2a482d48e9b79ba2f454ea60761a9a79947e981bf886e8125cc6d3c49ee1348b
service:
  main:
    ports:
      main:
        port: 9787
        targetPort: 9787
workload:
  main:
    podSpec:
      containers:
        main:
          extraArgs:
            - --config=/exporter/config.yaml
          probes:
            liveness:
              type: tcp
            readiness:
              type: tcp
            startup:
              type: tcp
configmap:
  exporter-configfile:
    enabled: true
    data:
      config.yaml: |
        {{- $.Values.exporter | toYaml | nindent 2 }}
persistence:
  configfile:
    enabled: true
    type: configmap
    readOnly: true
    objectName: exporter-configfile
    mountPath: /exporter/config.yaml
    subPath: config.yaml
metrics:
  main:
    enabled: true
    type: servicemonitor
    endpoints:
      - port: main
        path: /metrics
        interval: 1m
        scrapeTimeout: 15s
    targetSelector: main

exporter:
  exporter_port: 9787
  listen_address: 0.0.0.0
  devices:
    - name: Fritz!Box 7590
      hostname: '192.168.1.1'
      username: 'fritz_box'
      password: '123456789'
