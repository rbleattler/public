  repository: ghcr.io/maxmind/geoipupdate
  tag: v8.0.0@sha256:51e70dd6f16cd3e4d845ac02d09940b10772a75b9d741427d235a78570923c1d
  pullPolicy: IfNotPresent
ldapImage:
  repository: ghcr.io/goauthentik/ldap
  tag: 2026.5.6@sha256:68a595f5a7b75fb3615f1609725adaf1d45f743aafece715d943b9706074c307
  pullPolicy: IfNotPresent
radiusImage:
  repository: ghcr.io/goauthentik/radius
  tag: 2026.5.6@sha256:078e04a4a4ca1fa7fc71550bdd5be3044cceab6ba8e11ae851612d8211e7c25a
  pullPolicy: IfNotPresent
proxyImage:
  repository: ghcr.io/goauthentik/proxy
