# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/shokoanime/server
  pullPolicy: IfNotPresent
  tag: v5.3.3@sha256:b841f8249c9edfba102e4072e2b2a3eae4179e5dd553f29e11b9898a44f1e836
service:
  main:
    ports:
      main:
        port: 8111
        protocol: http
        targetPort: 8111
persistence:
  appdata:
    enabled: true
    mountPath: /home/shoko/.shoko/

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsGroup: 0
    runAsUser: 0
