# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/rustdesk/rustdesk-server-s6
  pullPolicy: IfNotPresent
  tag: 1.1.16@sha256:5974cd791a5aca6fbf01a167b37e7427db1d136e95b2710c33a34fdc9fea724c
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            RELAY: "localhost:21117"
            ENCRYPTED_ONLY: 1
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
service:
  main:
    ports:
      client1:
        enabled: true
        port: 21118
        protocol: tcp
      client2:
        enabled: true
        port: 21119
        protocol: tcp
      id:
        enabled: true
        port: 21116
        protocol: udp
      id2:
        enabled: true
        port: 21116
        protocol: tcp
      main:
        primary: true
        enabled: true
        port: 21117
        protocol: tcp
      nat:
        enabled: true
        port: 21115
        protocol: tcp
persistence:
  data:
    enabled: true
    mountPath: /data
