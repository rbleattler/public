# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/anirdev/slink
  pullPolicy: IfNotPresent
  tag: v1.12.3@sha256:c99c91ed81d74de87771dc70a835fdf2f9e52ec2c3ce379c2e059a6927f2b0d4
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
service:
  main:
    ports:
      main:
        protocol: http
        port: 3000
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            ORIGIN: "{{ .Values.chartContext.appUrl }}"
            USER_APPROVAL_REQUIRED: true
            IMAGE_MAX_SIZE: "15M"
persistence:
  database:
    enabled: true
    mountPath: "/app/var/data"
  images:
    enabled: true
    mountPath: "/app/slink/images"
ingress:
  main:
    required: true
