# yaml-language-server: $schema=./values.schema.json
image:
  repository: docker.io/anirdev/slink
  pullPolicy: IfNotPresent
  tag: v1.11.2@sha256:bd8d41b3a5bd1f73e85921695d3b9de7aa39492ae53d7c0e8f01d4d0e318eafc
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
service:
  main:
    ports:
      main:
        protocol: http
        port: 3000
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            ORIGIN: "{{ .Values.chartContext.appUrl }}"
            USER_APPROVAL_REQUIRED: true
            IMAGE_MAX_SIZE: "15M"
persistence:
  database:
    enabled: true
    mountPath: "/app/var/data"
  images:
    enabled: true
    mountPath: "/app/slink/images"
ingress:
  main:
    required: true
