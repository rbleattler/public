# yaml-language-server: $schema=./values.schema.json
image:
  repository: ghcr.io/fredrikburmester/streamystats-nextjs
  pullPolicy: IfNotPresent
  tag: 2.18.0@sha256:2057cfd30ebcc614119eecbfff40fd7d5f19e8411db528eb6f48b222ae077bbf

jobServerImage:
  repository: ghcr.io/fredrikburmester/streamystats-job-server
  pullPolicy: IfNotPresent
  tag: 2.18.0@sha256:669037d3a9726e51bd9a10056badd200becd980b5023f01edb9b3a0007646264

securityContext:
  container:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    readOnlyRootFilesystem: false

streamystats:
  # SESSION_SECRET used to sign session cookies. The chart refuses to start without one. openssl rand -base64 48
  sessionSecret: "change-me"

service:
  main:
    ports:
      main:
        port: 3000
        protocol: http
  jobserver:
    enabled: true
    targetSelector: jobserver
    ports:
      main:
        enabled: true
        port: 3005
        protocol: http

workload:
  main:
    enabled: true
    type: Deployment
    podSpec:
      containers:
        main:
          enabled: true
          primary: true
          env:
            NODE_ENV: production
            HOSTNAME: "0.0.0.0"
            PORT: "{{ .Values.service.main.ports.main.port }}"
            DATABASE_URL: '{{ printf "postgresql://%s:%s@%s:5432/%s" .Values.cnpg.main.user (urlquery .Values.cnpg.main.creds.password) (.Values.cnpg.main.creds.host | trimAll "\"") .Values.cnpg.main.database }}'
            JOB_SERVER_URL: "http://{{ printf \"%s-%s\" .Release.Name \"jobserver\" }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.jobserver.ports.main.port }}"
            SESSION_SECRET: "{{ .Values.streamystats.sessionSecret }}"
          probes:
            liveness:
              path: /api/health
            readiness:
              path: /api/health
            startup:
              path: /api/health
  jobserver:
    enabled: true
    type: Deployment
    podSpec:
      containers:
        jobserver:
          enabled: true
          primary: true
          imageSelector: jobServerImage
          env:
            NODE_ENV: production
            PORT: "{{ .Values.service.jobserver.ports.main.port }}"
            HOST: "0.0.0.0"
            DATABASE_URL: '{{ printf "postgresql://%s:%s@%s:5432/%s" .Values.cnpg.main.user (urlquery .Values.cnpg.main.creds.password) (.Values.cnpg.main.creds.host | trimAll "\"") .Values.cnpg.main.database }}'
            SESSION_SECRET: "{{ .Values.streamystats.sessionSecret }}"
            SESSION_POLL_INTERVAL_MS: "5000"
            CRON_ACTIVITY_SYNC: "*/1 * * * *"
            CRON_RECENT_ITEMS_SYNC: "*/1 * * * *"
            CRON_USER_SYNC: "*/1 * * * *"
            CRON_PEOPLE_SYNC: "*/15 * * * *"
            CRON_EMBEDDINGS_SYNC: "*/15 * * * *"
            CRON_GEOLOCATION_SYNC: "*/5 * * * *"
            CRON_FINGERPRINT_SYNC: "0 4 * * *"
            CRON_JOB_CLEANUP: "*/1 * * * *"
            CRON_OLD_JOB_CLEANUP: "0 3 * * *"
            CRON_FULL_SYNC: "0 2 * * *"
            CRON_DELETED_ITEMS_CLEANUP: "0 * * * *"
            SKIP_STARTUP_FULL_SYNC: "false"
          probes:
            liveness:
              port: "{{ .Values.service.jobserver.ports.main.port }}"
              path: /health
            readiness:
              port: "{{ .Values.service.jobserver.ports.main.port }}"
              path: /health
            startup:
              port: "{{ .Values.service.jobserver.ports.main.port }}"
              path: /health

cnpg:
  main:
    enabled: true
    user: postgres
    database: streamystats
